<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body {
            background: radial-gradient(circle, #2a0000 0%, #000000 100%);
            overflow: hidden;
            font-family: 'Space Mono', monospace;
            animation: flicker 0.15s infinite;
        }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9998; background-size: 100% 4px, 3px 100%; pointer-events: none; opacity: 0.4;
        }
        @keyframes flicker { 0% { opacity: 0.98; } 50% { opacity: 1; } 100% { opacity: 0.99; } }
        #preloader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.6s; }
        .preloader-text { font-size: 3rem; font-weight: 900; color: #ff0000; animation: glitch-anim 0.2s infinite; text-shadow: 2px 0 #fff, -2px 0 #4d0000; }
        @keyframes glitch-anim { 0%, 100% { transform: translate(0); } 20% { transform: translate(-5px, 5px); } 60% { transform: translate(5px, 5px); } }
        nav { backdrop-filter: blur(15px); border-bottom: 1px solid #4d0000; background: rgba(0, 0, 0, 0.8); }
        .text-glow { text-shadow: 0 0 20px rgba(255, 0, 0, 0.8); }
        .btn-metal { border: 1px solid #ff0000; color: #ff0000; transition: all 0.3s; box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
        .btn-metal:hover { background: #ff0000; color: white; box-shadow: 0 0 25px rgba(255, 0, 0, 0.8); }
        .glitch-hover:hover { animation: glitch 0.3s linear infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-3px, 3px); text-shadow: 2px 0 red; } 100% { transform: translate(0); } }
    </style>
</head>
<body class="text-gray-100">

    <div id="preloader"><div class="preloader-text">BAAPOKAN</div></div>

    <nav class="fixed top-0 w-full z-50 py-4 px-10 flex justify-between items-center">

        </div>
    </nav>

        </h1>
        <a href="https://instagram.com/baapokan" target="_blank" class="text-gray-400 hover:text-white transition mb-8 text-xs tracking-widest uppercase">
            @baapokan
        </a>
        <a href="gallery.html" class="btn-metal px-10 py-3 font-mono text-xs uppercase tracking-[0.3em]">
            Access Gallery
        </a>
    </section>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => document.getElementById('preloader').style.display = 'none', 600);
            }, 1000);
        });
    </script>
</body>
